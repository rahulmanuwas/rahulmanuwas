name: Metrics
on:
  schedule: [{ cron: "0 3 * * *" }]   # 03:00 UTC daily
  workflow_dispatch:
jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: rahulmanuwas
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Seoul

          # Contributions calendar (isometric, full year)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Most-used languages
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          # Lines of code changed
          plugin_lines: yes

          # Repositories you recently interacted with
          plugin_followup: yes
          plugin_followup_sections: repositories

          # NOTE: plugin_activity and plugin_achievements were removed.
          # plugin_achievements is broken upstream (lowlighter/metrics#1479):
          # GitHub changed its search page so the plugin can no longer fetch
          # global counts, producing "Unexpected error" and sometimes hanging
          # the job for 10+ minutes. plugin_activity was also failing.
          # Re-add them only once the upstream bug is fixed.
